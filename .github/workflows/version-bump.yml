name: Version bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer bump kind
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Bump version
        id: bump
        run: |
          VERSION=$(bun scripts/bump-version.ts --bump=${{ inputs.bump }})
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git commit -m "chore: release v${{ steps.bump.outputs.version }}"
          git tag -a "${{ steps.bump.outputs.tag }}" -m "Release v${{ steps.bump.outputs.version }}"
          git push origin HEAD
          git push origin "${{ steps.bump.outputs.tag }}"
